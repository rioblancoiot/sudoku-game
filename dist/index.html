<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
  <script type="module" crossorigin src="/assets/index-BJVCbiGy.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-fPuBI9gZ.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1 class="game-title">Sudoku</h1>
            <div class="controls">
                <div class="control-group">
                    <label class="difficulty-label" for="difficulty-select">Difficulty:</label>
                    <div class="difficulty-options" role="group" aria-label="Select difficulty">
                        <button type="button" class="difficulty-btn" data-difficulty="easy" aria-pressed="false">Easy</button>
                        <button type="button" class="difficulty-btn" data-difficulty="medium" aria-pressed="true">Medium</button>
                        <button type="button" class="difficulty-btn" data-difficulty="hard" aria-pressed="false">Hard</button>
                    </div>
                    <select id="difficulty-select" class="sr-only" aria-label="Difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="control-group">
                    <button id="new-game-btn" class="btn btn-primary" type="button">
                        <span class="btn-icon" aria-hidden="true">🔄</span>
                        <span class="btn-text">New Game</span>
                    </button>
                    <button id="restart-btn" class="btn" type="button">
                        <span class="btn-icon" aria-hidden="true">↩️</span>
                        <span class="btn-text">Restart</span>
                    </button>
                    <button id="pause-btn" class="btn" type="button" aria-pressed="false">
                        <span class="btn-icon" aria-hidden="true">⏸️</span>
                        <span class="btn-text">Pause</span>
                    </button>
                </div>
            </div>
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-label">Time:</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Moves:</span>
                    <span class="stat-value" id="move-count">0</span>
                </div>
            </div>
        </header>

        <main>
            <div class="grid-container">
                <div id="sudoku-grid" tabindex="0" role="grid" aria-label="Sudoku grid"></div>
            </div>
        </main>

        <section class="hints-controls" aria-label="Hint options">
            <div class="control-group">
                <button id="highlight-conflicts-btn" class="btn" type="button" aria-pressed="false">
                    <span class="btn-icon" aria-hidden="true">⚠️</span>
                    <span class="btn-text">Conflicts</span>
                </button>
                <button id="reveal-cell-btn" class="btn" type="button" disabled>
                    <span class="btn-icon" aria-hidden="true">💡</span>
                    <span class="btn-text">Reveal Cell</span>
                </button>
                <button id="logical-hint-btn" class="btn btn-primary" type="button" disabled>
                    <span class="btn-icon" aria-hidden="true">🧠</span>
                    <span class="btn-text">Logical Hint</span>
                </button>
            </div>
        </section>

        <!-- On-screen keypad for touch devices -->
        <div id="keypad" class="keypad" role="dialog" aria-label="Number pad" hidden>
            <div class="keypad-row">
                <button type="button" class="keypad-btn" data-value="1">1</button>
                <button type="button" class="keypad-btn" data-value="2">2</button>
                <button type="button" class="keypad-btn" data-value="3">3</button>
            </div>
            <div class="keypad-row">
                <button type="button" class="keypad-btn" data-value="4">4</button>
                <button type="button" class="keypad-btn" data-value="5">5</button>
                <button type="button" class="keypad-btn" data-value="6">6</button>
            </div>
            <div class="keypad-row">
                <button type="button" class="keypad-btn" data-value="7">7</button>
                <button type="button" class="keypad-btn" data-value="8">8</button>
                <button type="button" class="keypad-btn" data-value="9">9</button>
            </div>
            <div class="keypad-row">
                <button type="button" class="keypad-btn clear" data-value="clear">✕</button>
            </div>
        </div>

        <!-- Hint Dialog -->
        <dialog id="hint-dialog" class="modal">
            <div class="modal-content">
                <h2 class="modal-title">Logical Hint</h2>
                <div id="hint-content" class="hint-content"></div>
            </div>
            <div class="modal-actions">
                <button id="hint-close-btn" class="btn btn-primary" type="button">Got it</button>
            </div>
        </dialog>

        <!-- Game Over Dialog -->
        <dialog id="game-over-dialog" class="modal">
            <div class="modal-content">
                <h2 class="modal-title" id="game-over-title">Puzzle Solved!</h2>
                <div id="game-over-content" class="modal-stats"></div>
            </div>
            <div class="modal-actions">
                <button id="play-again-btn" class="btn btn-primary" type="button">Play Again</button>
                <button id="new-game-btn-dialog" class="btn" type="button">New Game</button>
            </div>
        </dialog>
    </div>

</body>
</html>
